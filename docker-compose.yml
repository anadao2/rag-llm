services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DOCS_DIR: /app/data/docs
      FAISS_DIR: /app/data/faiss
    volumes:
      - ./app:/app/app
      - ./data/docs:/app/data/docs
      - ./data/faiss:/app/data/faiss
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      PYTHONPATH: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: redis://redis:6379/0
      DOCS_DIR: /app/data/docs
      FAISS_DIR: /app/data/faiss
      INGEST_QUEUE: ingest:jobs
    volumes:
      - ./app:/app/app
      - ./data/docs:/app/data/docs
      - ./data/faiss:/app/data/faiss
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
